<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(
    title=~{::title},
    links=~{::link}
)}">
    <title>PostBlog</title>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
</head>

<body class="home-page">
    <header th:replace="~{fragments/navbar}"></header>

    <main>
        <section class="home-hero content-wrapper-size">
            <div class="hero-content">
                <span class="hero-greeting">Bem-vindo ao</span>
                <h1>Post<span class="hero-accent">Blog</span></h1>
                <p>Explore as últimas notícias, análises detalhadas, artigos sobre tecnologia, desenvolvimento e muito mais.</p>
            </div>
        </section>
        <div th:replace="~{fragments/news-render}"></div>
        <div class="flex-center" th:if="${newsList != null and !newsList.isEmpty()}">
            <button class="btn-primary" onclick="window.location.href='news'">Ver mais</button>
        </div>
    </main>

    <footer th:replace="~{fragments/footer}"></footer>
</body>

</html>
